<title>OURIN — All Commands</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030508;
  --bg2: #060c12;
  --bg3: #0a141e;
  --green: #00ff88;
  --cyan: #00e5ff;
  --amber: #ffaa00;
  --red: #ff2255;
  --purple: #9b59ff;
  --text: #e0f0ea;
  --muted: #3d6050;
  --border: rgba(0,255,136,0.10);
  --border2: rgba(0,255,136,0.20);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}

/* BG GRID */
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,255,136,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.022) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:rgba(3,5,8,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.lhex{width:28px;height:28px;background:linear-gradient(135deg,var(--green),var(--cyan));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:8px;color:#030508}
.lname{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--green)}
.lsub{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.h-search{flex:1;min-width:180px;max-width:360px;position:relative}
.h-search input{width:150%;background:rgba(0,255,136,0.05);border:1px solid var(--border2);color:var(--text);font-family:'Space Mono',monospace;font-size:8px;padding:6px 28px 6px 10px;outline:none;transition:all .2s;letter-spacing:.4px}
.h-search input::placeholder{color:var(--muted)}
.h-search input:focus{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.08);box-shadow:0 0 0 2px rgba(0,255,136,.08)}
.h-search .si{position:absolute;right:5px;top:50%;transform:translateY(-50%);color:var(--green);font-size:10px;pointer-events:none}
.h-stat{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;white-space:nowrap}
.h-stat span{color:var(--green)}
.h-back{font-family:'Space Mono',monospace;font-size:8px;color:#030508;text-decoration:none;padding:6px 10px;border:1px solid var(--green);letter-spacing:1px;transition:all .2s;flex-shrink:0;background:var(--green)}
.h-back:hover{background:rgba(0,255,136,0.7);border-color:var(--green);color:#030508}
  
  /* ── HERO STRIP ── */
.hero{padding:32px 24px 24px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 10% 50%,rgba(0,255,136,0.06) 0%,transparent 60%);pointer-events:none}
.hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(22px,4vw,40px);letter-spacing:-1.5px;line-height:1.05;margin-bottom:8px}
.hero-title span{background:linear-gradient(90deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:13.5px;color:rgba(224,240,234,0.6);line-height:1.7;max-width:600px;margin-bottom:16px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid;text-transform:uppercase;cursor:pointer;transition:all .2s;background:transparent;color:var(--text)}
.pill.all{border-color:rgba(0,255,136,.3);color:var(--green)}
.pill.all.active,.pill.all:hover{background:var(--green);color:#030508}
.pill[data-cat]{border-color:var(--border)}
.pill[data-cat]:hover{border-color:var(--border2);background:rgba(0,255,136,.05)}
.pill[data-cat].active{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.1);color:var(--green)}
.pill .pcount{opacity:.6;font-size:8px}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 200px);position:relative;z-index:1}

/* ── SIDEBAR ── */
.cat-sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;padding:12px 0}
.cat-sidebar::-webkit-scrollbar{width:3px}
.cat-sidebar::-webkit-scrollbar-thumb{background:var(--border)}
.cs-title{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:8px 14px 4px}
.cs-link{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;font-size:12.5px;color:rgba(224,240,234,.5);cursor:pointer;border-left:2px solid transparent;transition:all .2s;gap:6px}
.cs-link:hover{color:var(--text);background:rgba(0,255,136,.04)}
.cs-link.active{color:var(--green);border-left-color:var(--green);background:rgba(0,255,136,.06)}
.cs-icon{font-size:13px;flex-shrink:0}
.cs-name{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--green);flex-shrink:0}

/* ── MAIN ── */
.cmain{flex:1;min-width:0;padding:20px 24px 60px}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);scroll-margin-top:80px}
.sec-head::before{content:'';width:3px;height:20px;background:linear-gradient(to bottom,var(--green),var(--cyan));flex-shrink:0}
.sec-icon{font-size:18px}
.sec-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px}
.sec-cnt{font-family:'Space Mono',monospace;font-size:10px;color:var(--cyan);margin-left:4px}
.sec-wrap{margin-bottom:48px}

/* COMMAND GRID */
.cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}

/* COMMAND CARD */
.cmd-card{background:var(--bg);padding:14px 16px;cursor:pointer;transition:background .2s;position:relative;overflow:hidden}
.cmd-card:hover{background:rgba(0,255,136,.04)}
.cmd-card.active{background:rgba(0,255,136,.07);border-left:2px solid var(--green)}
.cmd-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,136,.03),transparent);opacity:0;transition:opacity .2s}
.cmd-card:hover::after{opacity:1}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.cc-name{font-family:'Space Mono',monospace;font-size:12px;color:var(--cyan);font-weight:700;word-break:break-all;flex:1}
.cc-tags{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0}
.tag{font-family:'Space Mono',monospace;font-size:8px;padding:2px 5px;text-transform:uppercase;letter-spacing:.5px}
.tag.O{background:rgba(255,170,0,.1);color:var(--amber);border:1px solid rgba(255,170,0,.2)}
.tag.P{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.2)}
.tag.A{background:rgba(255,34,85,.1);color:var(--red);border:1px solid rgba(255,34,85,.2)}
.tag.L{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.15)}
.cc-desc{font-size:12px;color:rgba(224,240,234,.55);line-height:1.6}

/* PREVIEW PANEL */
.preview{position:fixed;right:0;top:0;bottom:0;width:320px;background:rgba(6,12,18,.98);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .3s ease;backdrop-filter:blur(20px);display:flex;flex-direction:column}
.preview.open{transform:translateX(0)}
.pv-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pv-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.pv-close{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.pv-close:hover{color:var(--green);border-color:var(--border2)}
.pv-body{flex:1;overflow-y:auto;padding:18px}
.pv-body::-webkit-scrollbar{width:3px}
.pv-body::-webkit-scrollbar-thumb{background:var(--border)}
.pv-cmd{font-family:'Space Mono',monospace;font-size:18px;color:var(--green);font-weight:700;margin-bottom:10px;word-break:break-all}
.pv-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.pv-section-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;margin-top:18px}
.pv-desc{font-size:13.5px;color:rgba(224,240,234,.72);line-height:1.8;margin-bottom:4px}
/* PHONE MOCKUP */
.phone{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-top:8px}
.phone-bar{background:rgba(0,255,136,.08);padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.phone-dot{width:6px;height:6px;border-radius:50%}
.phone-status{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-left:auto}
.chat-area{padding:14px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.msg{max-width:85%;padding:8px 12px;font-size:12.5px;line-height:1.6;position:relative;word-break:break-word}
.msg.user{align-self:flex-end;background:rgba(0,255,136,.12);border:1px solid rgba(0,255,136,.2);color:var(--text)}
.msg.bot{align-self:flex-start;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.15);color:var(--text)}
.msg.user::after{content:'You';position:absolute;top:-16px;right:0;font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px}
.msg.bot::after{content:'OURIN';position:absolute;top:-16px;left:0;font-family:'Space Mono',monospace;font-size:8px;color:var(--green);letter-spacing:1px}
.msg-time{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;text-align:right}
.msg-wrap{display:flex;flex-direction:column;gap:4px;margin-top:16px}
/* Usage box */
.usage-box{background:var(--bg3);border:1px solid var(--border);padding:12px;margin-top:4px;font-family:'Space Mono',monospace;font-size:11.5px;color:rgba(224,240,234,.7);line-height:1.8}
.usage-box .uc{color:var(--green)}
.usage-box .ua{color:var(--cyan)}
.usage-box .um{color:var(--muted);font-style:italic}
/* No results */
.no-results{padding:48px 24px;text-align:center;color:var(--muted)}
.no-results .nr-icon{font-size:40px;margin-bottom:12px}
.no-results .nr-text{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:6px;color:var(--text)}
.no-results .nr-sub{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px}

/* MOBILE */
@media(max-width:768px){
  .cat-sidebar{display:none}
  .cmain{padding:16px 14px 60px}
  .preview{width:100%;border-left:none;border-top:1px solid var(--border)}
  .hero{padding:20px 14px 18px}
  .header{padding:10px 14px;gap:10px}
  .h-search{min-width:0}
  .cmd-grid{grid-template-columns:1fr}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cmd-card{animation:fadeIn .3s ease both}

/* ── FLOATING BUTTONS ── */
.fab-container{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab-menu{display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-bottom:4px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s ease}
.fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.fab-item{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
.fab-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:#030508;background:var(--green);padding:4px 10px;white-space:nowrap;border:1px solid var(--green);transition:all .2s}
.fab-item:hover .fab-label{background:rgba(0,255,136,0.8)}
.fab-icon-sm{width:34px;height:34px;background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s}
.fab-item:hover .fab-icon-sm{border-color:var(--green);background:rgba(0,255,136,0.08)}
.fab-main{width:36px;height:36px;background:linear-gradient(135deg,var(--green),var(--cyan));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s;box-shadow:0 0 20px rgba(0,255,136,0.3)}
.fab-main:hover{box-shadow:0 0 32px rgba(0,255,136,0.5);transform:scale(1.08)}
.fab-main.active{transform:rotate(45deg) scale(1.08)}
@keyframes fabPulse{0%,100%{box-shadow:0 0 20px rgba(0,255,136,0.3)}50%{box-shadow:0 0 36px rgba(0,255,136,0.6)}}
.fab-main{animation:fabPulse 2.5s ease-in-out infinite}
.fab-main.active{animation:none}
@media(max-width:768px){.fab-container{bottom:18px;right:16px}}
</style>
</head>

<!-- HEADER -->
<header class="header">
  <a href="ourin-docs.html" class="logo">
    <div class="lhex">OR</div>
    <div>
      <div class="lname">OURIN</div>
      <div class="lsub">Commands</div>
    </div>

  <div class="h-search">

<!-- HERO -->
<div class="hero">
  <h1 class="hero-title">All <span>Commands</span></h1>
  <p class="hero-desc">Browse, search and preview every OURIN command. Click any command to see usage example and live chat preview.</p>
  <div class="hero-pills" id="pillBar"></div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="cat-sidebar" id="catSidebar"></aside>

  <!-- MAIN -->

</div>

<!-- PREVIEW PANEL -->
<div class="preview" id="preview">
  <div class="pv-head">
    <div class="pv-title">Command Preview</div>
    <button class="pv-close" id="pvClose">✕ CLOSE</button>
  </div>
  <div class="pv-body" id="pvBody"></div>
</div>

<!-- FLOATING ACTION BUTTON -->
<div class="fab-container">
  <div class="fab-menu" id="fabMenu">
    <a href="/ourin-docs.html" class="fab-item">
      <span class="fab-label">DOCS</span>
      <div class="fab-icon-sm">📄</div>
    </a>
    <a href="/addcommand.html" class="fab-item">
      <span class="fab-label">ADDCMD</span>
      <div class="fab-icon-sm">➕</div>
    </a>
    <a href="/sendtools.html" class="fab-item">
      <span class="fab-label">SENDTOOLS</span>
      <div class="fab-icon-sm">➕</div>
    </a>
    <div class="fab-item" onclick="document.getElementById('searchInput').focus();window.scrollTo({top:0,behavior:'smooth'})">
      <span class="fab-label">SEARCH</span>
      <div class="fab-icon-sm">🔍</div>
    </div>
    <div class="fab-item" onclick="filterCat('all',null);window.scrollTo({top:0,behavior:'smooth'})">
      <span class="fab-label">ALL CMDS</span>
      <div class="fab-icon-sm">📋</div>
    </div>
  </div>
  <button class="fab-main" id="fabMain" onclick="toggleFab()" title="Quick Actions">≡</button>
</div>

<script>
function toggleFab(){
  const menu = document.getElementById('fabMenu');
  const btn = document.getElementById('fabMain');
  menu.classList.toggle('open');
  btn.classList.toggle('active');
}
// Close FAB when clicking outside
document.addEventListener('click',function(e){
  const fab = document.querySelector('.fab-container');
  if(!fab.contains(e.target)){
    document.getElementById('fabMenu').classList.remove('open');
    document.getElementById('fabMain').classList.remove('active');
  }
});
</script>

let activeCat = 'all';
let activeCmd = null;
let searchQ = '';

const totalCmds = CATS.reduce((a,c)=>a+c.cmds.length,0);
document.getElementById('totalCount').textContent = totalCmds;

// ══════════════════════════════════════════════════
// BUILD SIDEBAR
// ══════════════════════════════════════════════════
function buildSidebar(){
  const sb = document.getElementById('catSidebar');
  sb.innerHTML = `<div class="cs-title">Categories</div>
  <div class="cs-link active" data-cat="all" onclick="filterCat('all',this)">
    <span class="cs-icon">📋</span><span class="cs-name">All Commands</span><span class="cs-num">${totalCmds}</span>
  </div>`;
  CATS.forEach(c=>{
    sb.innerHTML += `<div class="cs-link" data-cat="${c.id}" onclick="filterCat('${c.id}',this)">
      <span class="cs-icon">${c.icon}</span><span class="cs-name">${c.name}</span><span class="cs-num">${c.cmds.length}</span>
    </div>`;
  });
}

// ══════════════════════════════════════════════════
// BUILD PILLS
// ══════════════════════════════════════════════════
function buildPills(){
  const pb = document.getElementById('pillBar');
  pb.innerHTML = `<button class="pill all active" onclick="filterCat('all',this)">All <span class="pcount">${totalCmds}</span></button>`;
  CATS.forEach(c=>{
    pb.innerHTML += `<button class="pill" data-cat="${c.id}" onclick="filterCat('${c.id}',this)">${c.icon} ${c.name} <span class="pcount">${c.cmds.length}</span></button>`;
  });
}

// ══════════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════════
function filterCat(cat, el){
  activeCat = cat;
  // Update sidebar
  document.querySelectorAll('.cs-link').forEach(l=>l.classList.remove('active'));
  const sbEl = document.querySelector(`.cs-link[data-cat="${cat}"]`);
  if(sbEl) sbEl.classList.add('active');
  // Update pills
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll(`.pill[data-cat="${cat}"], .pill.all`).forEach(p=>{
    if(cat==='all' && p.classList.contains('all')) p.classList.add('active');
    if(cat!=='all' && p.dataset.cat===cat) p.classList.add('active');
  });
  renderMain();
  if(cat!=='all'){
    const sec = document.getElementById('sec-'+cat);
    if(sec) setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
}

// ══════════════════════════════════════════════════
// RENDER MAIN
// ══════════════════════════════════════════════════
function renderMain(){
  const main = document.getElementById('cmdMain');
  const q = searchQ.toLowerCase().trim();
  let html = '';
  let visCount = 0;

  const catsToShow = activeCat==='all' ? CATS : CATS.filter(c=>c.id===activeCat);

  catsToShow.forEach(cat=>{
    const filtered = cat.cmds.filter(cmd=>{
      if(!q) return true;
      return cmd.n.includes(q) || cmd.desc.toLowerCase().includes(q) || cmd.n.replace('.','').includes(q.replace('.',''));
    });
    if(!filtered.length) return;
    visCount += filtered.length;

    html += `<div class="sec-wrap" id="sec-${cat.id}">
      <div class="sec-head">
        <span class="sec-icon">${cat.icon}</span>
        <span class="sec-name">${cat.name}</span>
        <span class="sec-cnt">${filtered.length} commands</span>
      </div>
      <div class="cmd-grid">`;

    filtered.forEach(cmd=>{
      const tagsHtml = cmd.tags.map(t=>`<span class="tag ${t}">${t==='O'?'Owner':t==='P'?'Prem':t==='A'?'Admin':'Limit'}</span>`).join('');
      html += `<div class="cmd-card" onclick="showPreview('${encodeURIComponent(JSON.stringify(cmd))}')" id="card-${cmd.n.replace('.','').replace(/[^a-z0-9]/gi,'_')}">
        <div class="cc-top">
          <span class="cc-name">${cmd.n}</span>
          <div class="cc-tags">${tagsHtml}</div>
        </div>
        <div class="cc-desc">${cmd.desc}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if(!visCount){
    html = `<div class="no-results">
      <div class="nr-icon">🔍</div>
      <div class="nr-text">No commands found</div>
      <div class="nr-sub">Try a different search query</div>
    </div>`;
  }

  main.innerHTML = html;
  document.getElementById('visCount').textContent = visCount;
}

// ══════════════════════════════════════════════════
// PREVIEW
// ══════════════════════════════════════════════════
function showPreview(encoded){
  const cmd = JSON.parse(decodeURIComponent(encoded));
  const pv = document.getElementById('preview');
  const body = document.getElementById('pvBody');

  const tagsHtml = cmd.tags.map(t=>{
    const labels={O:'Owner Only',P:'Premium Only',A:'Admin Only',L:'Limit Required'};
    return `<span class="tag ${t}">${labels[t]||t}</span>`;
  }).join('');

  const exLines = cmd.ex.split('\n').map(l=>`<span class="uc">${l}</span>`).join('\n');
  const resLines = cmd.res.split('\n').map(l=>`<span class="ua">${l}</span>`).join('\n');

  body.innerHTML = `
    <div class="pv-cmd">${cmd.n}</div>
    <div class="pv-tags">${tagsHtml}</div>

    <div class="pv-section-title">Description</div>
    <div class="pv-desc">${cmd.desc}</div>

    <div class="pv-section-title">Usage</div>
    <div class="usage-box"><span class="uc">${cmd.ex.split('\n')[0]}</span>${cmd.ex.split('\n').slice(1).map(l=>`\n<span class="ua">${l}</span>`).join('')}</div>

    <div class="pv-section-title">Chat Preview</div>
    <div class="phone">
      <div class="phone-bar">
        <div class="phone-dot" style="background:#ff5f57"></div>
        <div class="phone-dot" style="background:#febc2e"></div>
        <div class="phone-dot" style="background:#28c840"></div>
        <span class="phone-status">OURIN BOT ● ONLINE</span>
      </div>
      <div class="chat-area">
        <div class="msg-wrap">
          <div class="msg user">${cmd.ex.split('\n')[0]}<div class="msg-time">Now</div></div>
          <div class="msg bot">${cmd.res.replace(/\n/g,'<br>')}<div class="msg-time">Now ✓✓</div></div>
        </div>
      </div>
    </div>

    <div class="pv-section-title">Access Level</div>
    <div class="usage-box">
      ${cmd.tags.includes('O') ? '<span class="uc">👑 Owner Only</span>\n' : ''}${cmd.tags.includes('P') ? '<span class="ua">💎 Premium Required</span>\n' : ''}${cmd.tags.includes('A') ? '<span style="color:var(--red)">🔒 Group Admin Required</span>\n' : ''}<span class="um">⚡ Limit (Ⓛ) applied to this command</span>
    </div>
  `;

  pv.classList.add('open');
}

document.getElementById('pvClose').addEventListener('click',()=>{
  document.getElementById('preview').classList.remove('open');
});

// ══════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input',function(){
  searchQ = this.value;
  if(searchQ && activeCat!=='all'){
    activeCat='all';
    document.querySelectorAll('.cs-link').forEach(l=>l.classList.remove('active'));
    const allLink = document.querySelector('.cs-link[data-cat="all"]');
    if(allLink) allLink.classList.add('active');
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    const allPill = document.querySelector('.pill.all');
    if(allPill) allPill.classList.add('active');
  }
  renderMain();
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
buildSidebar();
buildPills();
renderMain();
</script>
</body>
</html>
